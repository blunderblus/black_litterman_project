<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>BL Dashboard (wireframe)</title>
<style>
  /* ── 와이어프레임 스타일(중립). 추후 교체 예정 ── */
  body{margin:0;background:#fff;color:#222;font-family:system-ui,'Segoe UI',sans-serif;font-size:13px}
  .block{border:1px dashed #999;margin:8px;padding:8px;position:relative}
  .block > .tag{position:absolute;top:-9px;left:8px;background:#fff;padding:0 6px;font-size:10px;color:#888;letter-spacing:1px}
  header{padding:14px 16px 6px}
  header h1{font-size:16px;margin:0 0 2px}
  header .meta,.muted{color:#888;font-size:11px}
  .kpis{display:flex;gap:8px;flex-wrap:wrap}
  .kpi{flex:1;min-width:120px;text-align:center}
  .kpi .label{font-size:10px;color:#888}
  .kpi .val{font-size:18px;margin-top:4px}
  .grid{display:flex;gap:0;align-items:flex-start}
  .col-list{flex:1.4;min-width:0}
  .col-detail{flex:1}
  table{width:100%;border-collapse:collapse;font-size:12px}
  th,td{border:1px solid #ddd;padding:5px 7px;text-align:left;white-space:nowrap}
  th{background:#f4f4f4;cursor:pointer;font-size:10px;color:#555}
  td.num{text-align:right}
  tbody tr{cursor:pointer}
  tbody tr:hover{background:#f8f8f8}
  tbody tr.sel{background:#eef3ff}
  .d-row{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid #eee}
  .d-row .k{color:#888}
  .d-sec{font-weight:bold;font-size:11px;color:#555;margin:12px 0 4px;border-bottom:2px solid #eee}
  .note{background:#fafafa;border:1px solid #eee;padding:8px;margin-top:6px;font-size:12px}
  .pill{border:1px solid #bbb;padding:1px 6px;font-size:10px;background:#f4f4f4}
  footer{padding:10px 16px}
</style>
</head>
<body>
<header>
  <h1>BL Dashboard <span class="muted">— 와이어프레임</span></h1>
  <div class="meta" id="meta"></div>
  <div class="muted">※ 와이어프레임(구조/데이터 확인용). 디자인·배치·차트는 추후 적용.</div>
</header>

<div class="block"><span class="tag">KPI</span>
  <div class="kpis" id="kpis"></div>
</div>

<div class="grid">
  <div class="col-list">
    <div class="block"><span class="tag">TARGET LIST / RANKING</span>
      <table><thead><tr id="hrow"></tr></thead><tbody id="tbody"></tbody></table>
    </div>
  </div>
  <div class="col-detail">
    <div class="block"><span class="tag">DETAIL PANEL</span>
      <div id="detail" class="muted">행 선택 …</div>
    </div>
  </div>
</div>

<div class="block" style="margin-top:0"><span class="tag">CHART AREA (placeholder)</span>
  <div class="muted">리밸런스 바차트 / 스코어 분포 — 추후 적용</div>
</div>

<footer><div class="muted" id="foot"></div></footer>

<script src="data.js"></script>
<script>
(function(){
  var D = window.BL_DATA || {summary:{},rows:[],meta:{}};
  var rows = D.rows || [], m = D.meta||{}, s = D.summary||{};
  var eok=function(v){return v==null?'-':(v/1e8).toFixed(1)+'억';};
  var num=function(v,d){return v==null?'-':Number(v).toFixed(d==null?4:d);};
  var pct=function(v){return v==null?'-':(v*100).toFixed(2)+'%';};

  document.getElementById('meta').textContent =
    'base_ym='+(m.base_ym||'-')+' · N='+(m.n_assets||rows.length)+' · λ='+(m.lambda||'-')+
    ' · τ='+(m.tau||'-')+' · src='+(m.source||'-');

  document.getElementById('kpis').innerHTML =
    [['ACTIVE_LEADS',s.active_leads],['AVG_SCORE',s.avg_score],['TOTAL_AUM',eok(s.total_aum)],
     ['FUNDING_GAP',eok(s.total_funding_gap)],['N',s.n]]
    .map(function(k){return '<div class="kpi"><div class="label">'+k[0]+'</div><div class="val">'+(k[1]==null?'-':k[1])+'</div></div>';}).join('');

  var cols=[['#','rank'],['CORP','corp_name'],['TIER','tier'],['SCORE','marketing_score'],
            ['ACTION','action_guide'],['E[R]','bl_return'],['ΔW','weight_diff'],['GAP','funding_gap']];
  document.getElementById('hrow').innerHTML = cols.map(function(c){return '<th data-k="'+c[1]+'">'+c[0]+'</th>';}).join('');

  function render(list){
    document.getElementById('tbody').innerHTML = list.map(function(r,i){
      return '<tr data-i="'+i+'"><td class="num">'+(i+1)+'</td><td>'+(r.corp_name||r.corp_code)+
        '</td><td>'+(r.tier||'-')+'</td><td class="num">'+num(r.marketing_score,1)+
        '</td><td><span class="pill">'+(r.action_guide||'-')+'</span></td><td class="num">'+num(r.bl_return,4)+
        '</td><td class="num">'+num(r.weight_diff,5)+'</td><td class="num">'+eok(r.funding_gap)+'</td></tr>';
    }).join('');
    [].forEach.call(document.querySelectorAll('#tbody tr'),function(tr){
      tr.onclick=function(){
        [].forEach.call(document.querySelectorAll('#tbody tr'),function(x){x.classList.remove('sel');});
        tr.classList.add('sel'); detail(list[+tr.getAttribute('data-i')]);
      };
    });
  }
  function detail(r){
    function row(k,v){return '<div class="d-row"><span class="k">'+k+'</span><span>'+v+'</span></div>';}
    document.getElementById('detail').innerHTML =
      '<div class="d-sec">CORP_PROFILE</div>'+
      row('NAME',r.corp_name||r.corp_code)+row('TIER/SECTOR',(r.tier||'-')+' / '+(r.sector_code||'-'))+
      row('REGION',r.region||'-')+row('CURRENT_BAL',eok(r.current_bal))+
      '<div class="d-sec">MODEL_OPINION</div>'+
      row('GROWTH P',pct(r.prob_growth_raw))+row('CHURN P',pct(r.prob_churn_raw))+
      row('ANOMALY(이상도·신뢰↓)',num(r.anomaly_score_raw,3))+row('NEWS',num(r.news_sentiment,3))+
      '<div class="d-sec">BLACK-LITTERMAN</div>'+
      row('Π / Q / Ω',num(r.pi,5)+' / '+num(r.q,5)+' / '+num(r.omega,5))+
      row('E[R]',num(r.bl_return,5))+row('W cur→tgt',num(r.current_weight,5)+' → '+num(r.target_weight,5))+
      row('SCORE / GAP',num(r.marketing_score,1)+' / '+eok(r.funding_gap))+
      '<div class="d-sec">SALES_NOTE (placeholder)</div><div class="note">'+(r.action_guide||'-')+'</div>';
  }
  var asc={};
  document.getElementById('hrow').onclick=function(e){
    var k=e.target.getAttribute('data-k'); if(!k||k==='rank')return; asc[k]=!asc[k];
    rows.sort(function(x,y){var a=x[k],b=y[k];
      if(typeof a==='string')return asc[k]?(''+a).localeCompare(b):(''+b).localeCompare(a);
      a=a==null?-1e18:a;b=b==null?-1e18:b;return asc[k]?a-b:b-a;});
    render(rows);
  };
  render(rows);
  var first=document.querySelector('#tbody tr'); if(first) first.click();
  document.getElementById('foot').textContent =
    '⚠ 합성 데모 데이터 · 모델 성능치는 미검증 가설(walk-forward conf: '+
    JSON.stringify((m.model_confidence)||{})+'). 실데이터는 API 키 설정 후 동일 파이프라인으로 생성.';
})();
</script>
</body>
</html>
